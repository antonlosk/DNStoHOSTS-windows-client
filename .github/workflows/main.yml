name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Next Version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))

          if [ "$PATCH" -gt 10 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          if [ "$MINOR" -gt 10 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      # 👇 НОВЫЙ ШАГ (rsrc без GOOS)
      - name: Generate Windows resource
        run: |
          go install github.com/akavel/rsrc@latest
          rsrc -ico icon.ico -o rsrc.syso

      - name: Build Optimized Windows Executable
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          if [ ! -f go.mod ]; then
            go mod init DNStoHOSTS
          fi

          go mod tidy

          go build -ldflags="-H=windowsgui -s -w" -trimpath -o DNStoHOSTS_${{ steps.version.outputs.version }}.exe main.go

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            DNStoHOSTS_${{ steps.version.outputs.version }}.exe \
            --title "Release ${{ steps.version.outputs.version }}" \
            --generate-notes
