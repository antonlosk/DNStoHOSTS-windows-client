name: Build Windows Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # КРИТИЧЕСКИЙ ШАГ: Скачивание библиотек
    - name: Restore NuGet Packages
      run: nuget restore DNStoHOSTS.csproj

    - name: Build App
      run: msbuild DNStoHOSTS.csproj /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DNStoHOSTS-Binary
        path: bin/Release/
