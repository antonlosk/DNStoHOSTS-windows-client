name: Build and Release DNStoHOSTS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой в GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # Восстановление библиотек (даже если мы их убрали, шаг полезен для кэша)
    - name: Restore NuGet Packages
      run: nuget restore DNStoHOSTS.csproj

    # Сборка проекта (AnyCPU без пробела!)
    - name: Build Application
      run: msbuild DNStoHOSTS.csproj /p:Configuration=Release /p:Platform=AnyCPU

    # Собираем все нужные файлы в одну папку для удобства
    - name: Prepare Artifacts
      run: |
        mkdir publish
        copy bin\Release\DNStoHOSTS.exe publish\
        echo "server=dns.google" > publish\settings.txt
        echo "port=443" >> publish\settings.txt
        echo "ipv4=true" >> publish\settings.txt
        echo "ipv6=false" >> publish\settings.txt
        echo "# Add domains here" > publish\input.txt

    # Загрузка артефакта в GitHub Actions (доступен 90 дней)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DNStoHOSTS-Windows-v1.2
        path: publish/

    # Автоматическое создание релиза (опционально)
    - name: Create GitHub Release
      if: github.event_name == 'push' && contains(github.ref, 'main')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.2.${{ github.run_number }}
        name: Release v1.2.${{ github.run_number }}
        files: publish/DNStoHOSTS.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
